<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Grave Reaper</title>

  <!-- PWA / installable app mode (additive — does not affect website play) -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1a0822">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grave Reaper">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

  <link rel="stylesheet" href="css/style.css?v=23">
</head>
<body>
  <div id="game-container">
    <!-- Pixel-art world (low-res, nearest-neighbour upscaling) -->
    <canvas id="game-canvas" width="480" height="270"></canvas>
    <!-- Crisp UI overlay (high-res, smooth text) -->
    <canvas id="ui-canvas"></canvas>
  </div>
  <!-- Fullscreen toggle (also switchable with the F key) -->
  <button id="fs-btn" type="button" title="Fullscreen (F)" aria-label="Fullscreen">⛶</button>
  <!-- Install-as-app button (shown only when the browser offers installation) -->
  <button id="install-btn" type="button" title="Install App" aria-label="Install App" hidden>📲 Install App</button>
  <script type="module" src="src/main.js?v=23"></script>
  <!-- PWA: offline cache + install prompt. Self-contained; skips itself inside iframes. -->
  <script type="module" src="src/pwa.js?v=23"></script>
</body>
</html>
