<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Grave Reaper</title>
  <link rel="stylesheet" href="css/style.css?v=22">
</head>
<body>
  <div id="game-container">
    <!-- Pixel-art world (low-res, nearest-neighbour upscaling) -->
    <canvas id="game-canvas" width="480" height="270"></canvas>
    <!-- Crisp UI overlay (high-res, smooth text) -->
    <canvas id="ui-canvas"></canvas>
  </div>
  <!-- Fullscreen toggle (also switchable with the F key) -->
  <button id="fs-btn" type="button" title="Fullscreen (F)" aria-label="Fullscreen">⛶</button>
  <script type="module" src="src/main.js?v=22"></script>
</body>
</html>
